<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hero Demo | Ishan Gala</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9f7',
                            100: '#e1f3ef',
                            200: '#c3e7df',
                            300: '#a5dbcf',
                            400: '#68c4af',
                            500: '#2aae96',
                            600: '#269d87',
                            700: '#208370',
                            800: '#19695a',
                            900: '#14564a',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Particles container needs to be absolute behind the content */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #111827; /* gray-900 */
            background-image: url("");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 50% 50%;
            z-index: 0;
            top: 0;
            left: 0;
        }

        .hero-content {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans text-gray-100 overflow-x-hidden">

    <!-- Hero Section -->
    <section class="relative min-h-screen flex items-center justify-center overflow-hidden">
        
        <!-- Particles Background -->
        <div id="particles-js"></div>

        <!-- Content -->
        <div class="hero-content max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center pointer-events-none">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-6">
                Hi, I'm <span class="text-primary-400">Ishan Gala</span>
            </h1>
            <h2 class="text-2xl md:text-3xl font-semibold text-gray-300 mb-6">
                Software Engineer @ Google<br>
                <span class="text-primary-400">ML & Robotics</span>
            </h2>
            <p class="text-lg text-gray-400 mb-10 max-w-2xl mx-auto">
                Passionate about Perception, Reinforcement Learning, and Inference Optimization. Move your mouse around to see the interactive neural network effect!
            </p>
            <div class="flex justify-center space-x-4 pointer-events-auto">
                <a href="index.html" class="bg-primary-600 hover:bg-primary-500 text-white px-8 py-3 rounded-full font-medium transition-all shadow-lg hover:shadow-primary-500/50">
                    Back to Main Site
                </a>
            </div>
        </div>
    </section>

    <!-- particles.js library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Configure particles.js
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#2aae96" // Primary color
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": false,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false,
                        "speed": 40,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#2aae96",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "grab"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 200,
                        "line_linked": {
                            "opacity": 0.8
                        }
                    },
                    "bubble": {
                        "distance": 400,
                        "size": 40,
                        "duration": 2,
                        "opacity": 8,
                        "speed": 3
                    },
                    "repulse": {
                        "distance": 200,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    },
                    "remove": {
                        "particles_nb": 2
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
